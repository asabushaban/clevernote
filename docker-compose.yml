services:
  postgres:
    image: postgres:14-alpine
    container_name: clevernote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clevernote_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clevernote_postgres_data:/var/lib/postgresql/data

volumes:
  clevernote_postgres_data:
